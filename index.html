<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAKE Japanese Academy - Membership</title>
<style>
  * {

  }
  body {
    margin: 0;

  .card {
    background: #ffffff;

  .subtitle {

    font-size: 14px;
    margin-bottom: 24px;
  }
  .price {
    font-size: 36px;
    font-weight: 700;
    color: #1a1a1a;
    margin: 16px 0 4px;
  }
  .price span {
    font-size: 16px;
    font-weight: 400;
    color: #888;
  }

<div class="card">

  <h1>TAKE Japanese Academy</h1>

  <div class="price">$10.00 <span>/ month</span></div>

    <li>Exclusive Japanese lessons</li>
    <li>Practice sessions & grammar checks</li>
    <li>Supportive learning community</li>

  </ul>

</div>

<script src="https://www.paypal.com/sdk/js?client-id=AQ2avwFxZjDdtFlQ7CehsZStH01gfIb7WUDUVwOUMi8RQrDhKl_vzeShvsVuj2Lo72MQ4kFI7rgFhmEY&vault=true&intent=subscription" data-sdk-integration-source="button-factory"></script>

          shape: 'pill',
          color: 'gold',
          layout: 'vertical',
          label: 'subscribe'

      createSubscription: function(data, actions) {
        return actions.subscription.create({
          plan_id: 'P-6UN746928T0601544NJH5CDA'

      onApprove: function(data, actions) {
        window.location.href = "https://discord.gg/DVE6VWe4AX";
      }
  }).render('#paypal-button-container-P-6UN746928T0601544NJH5CDA');
